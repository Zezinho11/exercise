<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dragon's Dogma II — Character Creator Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
  <style>
    /* ==================== RESET & VARIABLES ==================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c8952a; --gold-dim: #8a6018; --gold-light: #e8b84b;
      --dark: #1a1208; --dark2: #2a1f0a; --dark3: #0e0b05;
      --parchment: #e8d5a0; --muted: #8a7040; --very-muted: #6a5030;
      --section-bg: #c8952a08; --border: #c8952a2a;
      --font-cinzel: 'Cinzel', serif;
      --font-crimson: 'Crimson Text', Georgia, serif;
    }

    /* ==================== LAYOUT PRINCIPALS ==================== */
    body {
      font-family: var(--font-crimson);
      background: var(--dark3);
      color: var(--parchment);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 12px;
    }

    .wrap {
      width: 100%;
      max-width: 1100px;
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 50%, var(--dark) 100%);
      border: 1px solid #c8952a44;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 24px 80px #00000088;
    }

    /* ==================== HEADER ==================== */
    .header {
      background: linear-gradient(180deg, #c8952a1a 0%, transparent 100%);
      border-bottom: 1px solid #c8952a44;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-icon {
      width: 40px;
      height: 40px;
      border: 1px solid #c8952a55;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo {
      font-family: var(--font-cinzel);
      font-size: 14px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 2px;
      text-transform: uppercase;
      line-height: 1.2;
    }

    .logo small {
      display: block;
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 3px;
      font-weight: 400;
    }

    .divider-v {
      width: 1px;
      height: 36px;
      background: #c8952a33;
      flex-shrink: 0;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
    }

    /* ==================== BODY LAYOUT ==================== */
    .body {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: 600px;
    }

    .sidebar {
      border-right: 1px solid var(--border);
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: #c8952a04;
    }

    .main {
      padding: 20px 24px;
      overflow-y: auto;
      max-height: 78vh;
    }

    /* ==================== LABELS & UPLOAD ==================== */
    .label {
      font-family: var(--font-cinzel);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .upload-zone {
      border: 1px dashed #c8952a44;
      border-radius: 8px;
      padding: 14px;
      text-align: center;
      cursor: pointer;
      background: #c8952a06;
      min-height: 130px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
    }

    .upload-zone:hover {
      border-color: #c8952a88;
      background: #c8952a0e;
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon {
      width: 38px;
      height: 38px;
      border: 1px solid #c8952a55;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .upload-text {
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
      pointer-events: none;
    }

    .upload-text strong {
      color: var(--gold);
      font-style: normal;
    }

    #previewImg {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #c8952a44;
      display: none;
    }

    /* ==================== BUTTONS ==================== */
    .btn {
      padding: 10px;
      border-radius: 6px;
      font-family: var(--font-cinzel);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      width: 100%;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--gold-dim));
      color: var(--dark);
      display: none;
    }

    .btn-primary:hover {
      opacity: 0.87;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid #c8952a55;
      color: var(--gold);
      margin-top: 16px;
    }

    .btn-secondary:hover {
      background: #c8952a11;
      border-color: var(--gold);
    }

    /* ==================== PILLS & TABS ==================== */
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .pill {
      font-size: 10px;
      padding: 3px 9px;
      border: 1px solid #c8952a44;
      border-radius: 20px;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--font-cinzel);
      letter-spacing: 0.5px;
      background: transparent;
      transition: all 0.15s;
    }

    .pill:hover,
    .pill.active {
      border-color: var(--gold);
      color: var(--gold);
      background: #c8952a11;
    }

    .page-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .page-tab {
      font-family: var(--font-cinzel);
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      cursor: pointer;
      background: transparent;
      transition: all 0.2s;
    }

    .page-tab:hover {
      border-color: #c8952a88;
      color: var(--parchment);
    }

    .page-tab.active {
      border-color: var(--gold);
      color: var(--gold);
      background: #c8952a11;
    }

    .page-content {
      display: none;
    }

    .page-content.active {
      display: block;
    }

    /* ==================== STATUS & LOADING ==================== */
    .status-box {
      padding: 11px 14px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--section-bg);
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
      text-align: center;
      margin-bottom: 18px;
    }

    .loading {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--gold);
      font-size: 12px;
      font-family: var(--font-cinzel);
      letter-spacing: 1px;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid #c8952a22;
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ==================== SECTIONS ==================== */
    .section-title {
      font-family: var(--font-cinzel);
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--gold);
      text-transform: uppercase;
      margin: 0 0 12px;
      padding-bottom: 7px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-dot {
      display: inline-block;
      width: 4px;
      height: 4px;
      background: var(--gold);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .section-block {
      margin-bottom: 20px;
    }

    .separator {
      height: 1px;
      background: linear-gradient(90deg, transparent, #c8952a22, transparent);
      margin: 0 0 20px;
    }

    /* ==================== SLIDERS ==================== */
    .sliders-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 32px;
      margin-bottom: 4px;
    }

    .slider-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .slider-name {
      font-size: 10px;
      color: #c8952a88;
      font-family: var(--font-cinzel);
      letter-spacing: 0.5px;
    }

    .slider-val {
      font-size: 11px;
      color: var(--parchment);
      font-weight: 600;
      min-width: 40px;
      text-align: right;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      background: var(--dark2);
      border-radius: 2px;
      outline: none;
      border: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--gold);
      border: 2px solid var(--dark);
      cursor: pointer;
      box-shadow: 0 0 5px #c8952a44;
    }

    input[type="range"]::-moz-range-thumb {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--gold);
      border: 2px solid var(--dark);
      cursor: pointer;
    }

    /* ==================== SELECT ==================== */
    .select-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .select-row select {
      background: var(--dark2);
      color: var(--parchment);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 5px 8px;
      font-family: var(--font-crimson);
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }

    .select-row select:focus {
      border-color: var(--gold);
    }

    .select-label {
      font-size: 10px;
      color: #c8952a88;
      font-family: var(--font-cinzel);
      letter-spacing: 0.5px;
    }

    /* ==================== HINTS ==================== */
    .hint {
      font-size: 11px;
      color: var(--very-muted);
      font-style: italic;
      text-align: center;
      margin-top: 8px;
    }

    /* ==================== RESPONSIVE ==================== */
    @media (max-width: 700px) {
      .body {
        grid-template-columns: 1fr;
      }
      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .sliders-grid {
        grid-template-columns: 1fr;
      }
      .main {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">

  <!-- ==================== ARCHITECTURE LAYERS ==================== -->
  <!-- Layer 1: Domain (Business Logic & Data Models) -->
  <script>
    /**
     * DOMAIN LAYER
     * Contains business logic and data models independent of UI/API
     */

    // Character Configuration Model
    class CharacterConfig {
      constructor() {
        this.race = 'Human';
        this.gender = 'Male';
        this.vocation = 'Fighter';
        this.sliders = {};
      }

      setSliderValue(sliderId, value) {
        this.sliders[sliderId] = value;
      }

      getSliderValue(sliderId) {
        return this.sliders[sliderId] || 0;
      }

      toJSON() {
        return {
          race: this.race,
          gender: this.gender,
          vocation: this.vocation,
          sliders: { ...this.sliders }
        };
      }

      fromJSON(data) {
        this.race = data.race || 'Human';
        this.gender = data.gender || 'Male';
        this.vocation = data.vocation || 'Fighter';
        this.sliders = { ...data.sliders };
      }
    }

    const CHARACTER_OPTIONS = {
      races: ['Human', 'Elf', 'Dwarf', 'Halfling'],
      genders: ['Male', 'Female'],
      vocations: ['Fighter', 'Rogue', 'Mage', 'Cleric', 'Ranger', 'Mystic Knight', 'Warfarer', 'Sorcerer']
    };

    // Shared state
    const characterConfig = new CharacterConfig();
    let photoData = { base64: '', mime: '' };
  </script>

  <!-- Layer 2: Repository (API & Data Access) -->
  <script>
    /**
     * REPOSITORY LAYER
     * Handles external API calls and data fetching
     */

    class AnthropicRepository {
      constructor(apiEndpoint = 'https://api.anthropic.com/v1/messages') {
        this.apiEndpoint = apiEndpoint;
      }

      async analyzeCharacterFace(photoBase64, photoMime, character) {
        const prompt = this.buildAnalysisPrompt(character);
        
        try {
          const response = await fetch(this.apiEndpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              model: 'claude-sonnet-4-20250514',
              max_tokens: 1200,
              messages: [{
                role: 'user',
                content: [
                  {
                    type: 'image',
                    source: {
                      type: 'base64',
                      media_type: photoMime,
                      data: photoBase64
                    }
                  },
                  { type: 'text', text: prompt }
                ]
              }]
            })
          });

          const data = await response.json();
          
          if (data.error) {
            throw new Error(data.error.message);
          }

          const text = (data.content || [])
            .map(block => block.text || '')
            .join('');
          
          const cleaned = text.replace(/```json|```/g, '').trim();
          return JSON.parse(cleaned);
        } catch (error) {
          throw new Error(`API Error: ${error.message}`);
        }
      }

      buildAnalysisPrompt(character) {
        return `You are an expert Dragon's Dogma 2 character creator. Analyze this face photo and return ONLY a valid JSON object. No markdown, no backticks, no explanation.

Race: ${character.race}. Gender: ${character.gender}. Vocation: ${character.vocation}.

Map facial features to these exact DD2 slider IDs and ranges:

height (140-220), torso (-100,100), muscle_strength (-100,100), traps (-100,100), upper_mass (-100,100), lower_mass (-100,100), upper_size (-100,100), lower_size (-100,100),
head_size (-100,100), head_length (-100,100), head_width (-100,100), head_depth (-100,100), face_height (-100,100), neck_length (-100,100), neck_thickness (-100,100),
shoulder_width (-100,100), chest_thickness (-100,100), chest_size (-100,100), torso_width (-100,100), arm_size (-100,100),
waist_width (-100,100), rear_size (-100,100), leg_size (-100,100), thigh_size (-100,100), calf_size (-100,100), posture (-100,100),
skin_color (1-31: 1=very light 13=medium 31=very dark), wrinkles (0-100), skin_sheen (0-100),
brow_height (-100,100), brow_spacing (-100,100), brow_depth_overall (-100,100), brow_angle (-100,100), brow_bend (-100,100),
eye_height (-100,100), eye_width (-100,100), eye_depth (-100,100), eye_size (-100,100), eye_angle (-100,100), squint_left (0-100), squint_right (0-100),
nose_length (-100,100), bridge_width (-100,100), bridge_height (-100,100), bridge_bump_overall (-100,100), nostril_size (-100,100), nostril_width (-100,100), tip_depth (-100,100), tip_angle (-100,100), tip_sharpness (-100,100),
ear_size (-100,100), ear_angle (-100,100),
cheek_thickness (-100,100), cheek_bulge (-100,100), neck_fat (-100,100), cheek_height (-100,100), cheek_width (-100,100), cheek_depth (-100,100),
mouth_height (-100,100), mouth_width (-100,100), mouth_protrusion (-100,100), mouth_corners (-100,100), lip_thickness (-100,100), lower_lip_position (-100,100),
jaw_definition (-100,100), jaw_width (-100,100), jaw_position (-100,100), jaw_protrusion (-100,100), chin_height (-100,100), chin_width (-100,100), chin_protrusion (-100,100), chin_sharpness (-100,100),
root_color (1-120), tip_color (1-120), eyebrow_color (1-120), iris_primary (1-200), sclera_color (1-200)

Be precise. Analyze real facial structure carefully.`;
      }
    }

    const anthropicRepository = new AnthropicRepository();
  </script>

  <!-- Layer 3: Use Cases (Application Services) -->
  <script>
    /**
     * USE CASES LAYER
     * Orchestrates domain logic and repositories
     */

    class CharacterAnalysisUseCase {
      constructor(repository, characterConfig) {
        this.repository = repository;
        this.characterConfig = characterConfig;
      }

      async execute(photoBase64, photoMime) {
        const result = await this.repository.analyzeCharacterFace(
          photoBase64,
          photoMime,
          this.characterConfig
        );
        
        this.applySliderValues(result);
        return result;
      }

      applySliderValues(sliderData) {
        Object.entries(sliderData).forEach(([sliderId, value]) => {
          this.characterConfig.setSliderValue(sliderId, value);
        });
      }
    }

    class ExportCharacterUseCase {
      constructor(characterConfig) {
        this.characterConfig = characterConfig;
      }

      execute() {
        const sectionNames = {
          'body_body': 'Corpo',
          'body_head': 'Cabeça (Proporções)',
          'body_upper': 'Parte Superior',
          'body_lower': 'Parte Inferior',
          'body_posture': 'Postura',
          'head_skin': 'Base & Pele',
          'head_brow': 'Sobrancelhas',
          'head_eyes': 'Olhos',
          'head_nose': 'Nariz',
          'head_ears': 'Orelhas',
          'head_cheeks': 'Bochechas',
          'head_mouth': 'Boca',
          'head_jaw': 'Mandíbula & Queixo',
          'hair_hair': 'Cabelo',
          'hair_eyebrows': 'Sobrancelhas (cor)',
          'makeup_eyeball': 'Globo Ocular',
        };

        const lines = [
          `=== Dragon's Dogma 2 — Arisen ===`,
          `Raça: ${this.characterConfig.race} | Gênero: ${this.characterConfig.gender} | Vocação: ${this.characterConfig.vocation}`,
          ''
        ];

        Object.entries(SLIDER_DEFINITIONS).forEach(([section, sliders]) => {
          lines.push(`--- ${sectionNames[section] || section} ---`);
          sliders.forEach(slider => {
            const value = this.characterConfig.getSliderValue(slider.id);
            lines.push(`${slider.name}: ${value}`);
          });
          lines.push('');
        });

        return lines.join('\n');
      }
    }

    const analysisUseCase = new CharacterAnalysisUseCase(anthropicRepository, characterConfig);
    const exportUseCase = new ExportCharacterUseCase(characterConfig);
  </script>

  <!-- Layer 4: Presentation (UI Controllers) -->
  <script>
    /**
     * PRESENTATION LAYER
     * Handles UI interactions and DOM manipulation
     */

    class UIController {
      constructor() {
        this.photoInput = document.getElementById('photoInput');
        this.uploadZone = document.getElementById('uploadZone');
        this.analyzeBtn = document.getElementById('analyzeBtn');
        this.copyBtn = document.getElementById('copyBtn');
        this.previewImg = document.getElementById('previewImg');
        this.statusText = document.getElementById('statusText');
        this.loadingIndicator = document.getElementById('loadingIndicator');
      }

      renderCharacterOptions() {
        this.renderPills('racePills', CHARACTER_OPTIONS.races, 'race');
        this.renderPills('genderPills', CHARACTER_OPTIONS.genders, 'gender');
        this.renderPills('vocationPills', CHARACTER_OPTIONS.vocations, 'vocation');
      }

      renderPills(containerId, options, property) {
        const container = document.getElementById(containerId);
        container.innerHTML = options
          .map(option => {
            const isActive = characterConfig[property] === option ? 'active' : '';
            return `<button class="pill ${isActive}" data-value="${option}">${option}</button>`;
          })
          .join('');

        container.addEventListener('click', (e) => {
          if (e.target.classList.contains('pill')) {
            container.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
            e.target.classList.add('active');
            characterConfig[property] = e.target.dataset.value;
          }
        });
      }

      renderSliderPages() {
        const container = document.getElementById('pagesContainer');
        const tabsContainer = document.getElementById('pageTabs');
        
        const pages = Object.entries(SLIDER_DEFINITIONS);
        const sectionNames = {
          'body_body': 'Corpo',
          'body_head': 'Cabeça',
          'body_upper': 'Superior',
          'body_lower': 'Inferior',
          'body_posture': 'Postura',
          'head_skin': 'Pele',
          'head_brow': 'Sobrancelhas',
          'head_eyes': 'Olhos',
          'head_nose': 'Nariz',
          'head_ears': 'Orelhas',
          'head_cheeks': 'Bochechas',
          'head_mouth': 'Boca',
          'head_jaw': 'Mandíbula',
          'hair_hair': 'Cabelo',
          'hair_eyebrows': 'Cor Sobrancelha',
          'makeup_eyeball': 'Olhos',
        };

        // Render tabs
        tabsContainer.innerHTML = pages
          .map(([sectionId], index) => {
            const isActive = index === 0 ? 'active' : '';
            return `<button class="page-tab ${isActive}" data-page="${index}">${sectionNames[sectionId]}</button>`;
          })
          .join('');

        // Render pages
        container.innerHTML = pages
          .map(([sectionId, sliders], index) => {
            const isActive = index === 0 ? 'active' : '';
            return `
              <div class="page-content ${isActive}" data-page="${index}">
                <h3 class="section-title">
                  <span class="section-dot"></span>
                  ${sectionNames[sectionId]}
                </h3>
                <div class="sliders-grid">
                  ${sliders.map(slider => this.createSliderHTML(slider)).join('')}
                </div>
              </div>
            `;
          })
          .join('');

        // Tab navigation
        tabsContainer.addEventListener('click', (e) => {
          if (e.target.classList.contains('page-tab')) {
            const pageIndex = e.target.dataset.page;
            tabsContainer.querySelectorAll('.page-tab').forEach(t => t.classList.remove('active'));
            e.target.classList.add('active');
            container.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            container.querySelector(`[data-page="${pageIndex}"]`).classList.add('active');
          }
        });

        // Slider value updates
        container.addEventListener('input', (e) => {
          if (e.target.type === 'range') {
            const sliderId = e.target.dataset.id;
            const value = e.target.value;
            characterConfig.setSliderValue(sliderId, parseInt(value));
            e.target.nextElementSibling.textContent = value;
          }
        });
      }

      createSliderHTML(slider) {
        const value = characterConfig.getSliderValue(slider.id) || slider.min;
        return `
          <div class="slider-row">
            <div class="slider-header">
              <span class="slider-name">${slider.name}</span>
              <span class="slider-val">${value}</span>
            </div>
            <input type="range" data-id="${slider.id}" min="${slider.min}" max="${slider.max}" value="${value}"/>
          </div>
        `;
      }

      setupPhotoUpload() {
        this.photoInput.addEventListener('change', (e) => this.handlePhotoSelect(e));
        this.uploadZone.addEventListener('dragover', (e) => {
          e.preventDefault();
          this.uploadZone.style.borderColor = '#c8952a';
        });
        this.uploadZone.addEventListener('dragleave', () => {
          this.uploadZone.style.borderColor = '';
        });
        this.uploadZone.addEventListener('drop', (e) => {
          e.preventDefault();
          this.uploadZone.style.borderColor = '';
          const file = e.dataTransfer.files[0];
          if (file) this.processPhoto(file);
        });
      }

      handlePhotoSelect(event) {
        const file = event.target.files[0];
        if (file) this.processPhoto(file);
      }

      processPhoto(file) {
        photoData.mime = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'].includes(file.type)
          ? file.type
          : 'image/jpeg';

        const reader = new FileReader();
        reader.onload = (e) => {
          photoData.base64 = e.target.result.split(',')[1];
          this.previewImg.src = e.target.result;
          this.previewImg.style.display = 'block';
          document.getElementById('uploadIcon').style.display = 'none';
          document.getElementById('uploadText').style.display = 'none';
          this.analyzeBtn.style.display = 'block';
          this.statusText.textContent = 'Foto carregada! Clique em "Analisar Rosto".';
        };
        reader.readAsDataURL(file);
      }

      setupAnalyzeButton() {
        this.analyzeBtn.addEventListener('click', () => this.analyze());
      }

      async analyze() {
        if (!photoData.base64) return;

        this.analyzeBtn.disabled = true;
        this.statusText.style.display = 'none';
        this.loadingIndicator.style.display = 'flex';

        try {
          await analysisUseCase.execute(photoData.base64, photoData.mime);
          this.statusText.textContent = '✦ Análise concluída! Navegue pelas abas para ver todos os sliders ajustados.';
          this.analyzeBtn.textContent = '⚔ Reanalisar';
          this.renderSliderPages();
        } catch (error) {
          this.statusText.textContent = `Erro: ${error.message}`;
        } finally {
          this.loadingIndicator.style.display = 'none';
          this.statusText.style.display = 'block';
          this.analyzeBtn.disabled = false;
        }
      }

      setupCopyButton() {
        this.copyBtn.addEventListener('click', async () => {
          const text = exportUseCase.execute();
          try {
            await navigator.clipboard.writeText(text);
            this.copyBtn.textContent = '✓ Copiado!';
            setTimeout(() => {
              this.copyBtn.textContent = 'Copiar Configurações ↗';
            }, 2000);
          } catch (error) {
            this.statusText.textContent = 'Erro ao copiar para clipboard.';
          }
        });
      }

      initialize() {
        this.renderCharacterOptions();
        this.renderSliderPages();
        this.setupPhotoUpload();
        this.setupAnalyzeButton();
        this.setupCopyButton();
      }
    }

    // Initialize application
    const uiController = new UIController();
    uiController.initialize();
  </script>
</body>
</html>
